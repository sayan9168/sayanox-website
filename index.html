<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sayanox Private Limited</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: #080c10;
  color: #f0f0eb;
  font-family: 'DM Sans', sans-serif;
  overflow-x: hidden;
}

/* BACKGROUND GLOW */
.bg-glow {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 55% 45% at 10% 15%, rgba(0,229,192,0.07) 0%, transparent 65%),
    radial-gradient(ellipse 50% 55% at 90% 85%, rgba(0,95,255,0.09) 0%, transparent 65%);
}

/* POWERED STRIP */
.top-strip {
  position: relative; z-index: 10;
  text-align: center;
  padding: 9px 16px;
  background: rgba(0,229,192,0.06);
  border-bottom: 1px solid rgba(0,229,192,0.14);
  font-size: 12px;
  color: rgba(240,240,235,0.5);
  letter-spacing: 1px;
}
.top-strip strong { color: #00e5c0; }

/* NAV */
nav {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 15px 48px;
  background: rgba(8,12,16,0.92);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800; font-size: 22px;
  letter-spacing: -0.5px;
}
.logo .dot { color: #00e5c0; }
.logo .tag {
  font-size: 9px; font-weight: 400;
  color: rgba(240,240,235,0.4);
  margin-left: 5px; letter-spacing: 2px;
  text-transform: uppercase;
  vertical-align: middle;
}
.nav-links { display: flex; align-items: center; gap: 28px; }
.nav-links a {
  color: rgba(240,240,235,0.5);
  text-decoration: none; font-size: 14px; font-weight: 500;
  transition: color 0.2s;
}
.nav-links a:hover { color: #f0f0eb; }

/* SIGN IN BUTTON */
#signinBtn {
  display: flex; align-items: center; gap: 8px;
  background: #f0f0eb; color: #111;
  border: none; border-radius: 8px;
  padding: 8px 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 600;
  cursor: pointer;
  transition: box-shadow 0.2s, transform 0.2s;
}
#signinBtn:hover { transform: translateY(-1px); box-shadow: 0 4px 18px rgba(0,229,192,0.22); }

/* USER BAR */
#userBar {
  display: none; align-items: center; gap: 8px;
  background: rgba(0,229,192,0.08);
  border: 1px solid rgba(0,229,192,0.2);
  border-radius: 8px; padding: 6px 12px;
}
#userBar.on { display: flex; }
.upic {
  width: 26px; height: 26px; border-radius: 50%;
  background: linear-gradient(135deg, #00e5c0, #005fff);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: #080c10;
  overflow: hidden; flex-shrink: 0;
}
.upic img { width: 100%; height: 100%; object-fit: cover; }
.uname { font-size: 13px; font-weight: 500; color: #f0f0eb; max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#logoutBtn {
  background: none; border: none;
